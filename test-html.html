<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; display: flex; width: 429px; height: 715px; }
  .slideCarousel {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: flex-start;
    align-items: stretch;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 3% 15%;
    gap: 20px;
    scrollbar-width: none;
    scroll-snap-type: x mandatory;
    height: 100%;
    width: 100%;
    box-sizing: border-box;
  }
  .carouselItemMobile {
    display: flex;
    flex: 0 0 auto;
    width: clamp(240px, 70vw, 320px);
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    scroll-snap-align: center;
    min-width: 0;
    border: 1px solid red;
  }
</style>
</head>
<body>
  <div class="slideCarousel">
    <div class="carouselItemMobile">1</div>
    <div class="carouselItemMobile">2</div>
    <div class="carouselItemMobile">3</div>
    <div class="carouselItemMobile">4</div>
  </div>
  <script>
    const el = document.querySelector('.slideCarousel');
    console.log(el.scrollWidth, el.clientWidth);
  </script>
</body>
</html>
